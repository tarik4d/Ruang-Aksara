<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Muh Irwan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-lg border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-feather-alt text-2xl text-purple-600"></i>
                <h1 class="text-2xl font-bold text-gray-800">Admin Panel</h1>
            </div>
            <div class="flex items-center space-x-4">
                <span id="adminStatus" class="text-sm text-gray-600">👤 Admin</span>
                <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </button>
                <a href="/" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    <i class="fas fa-arrow-left mr-2"></i>Kembali
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Login Form -->
        <div id="loginForm" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <i class="fas fa-lock text-5xl text-purple-600 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800">Login Admin</h2>
                <p class="text-gray-500">Masuk untuk mengelola puisi</p>
            </div>
            <form id="adminLoginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <button type="submit" 
                        class="w-full py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
            </form>
        </div>

        <!-- Dashboard -->
        <div id="adminDashboard" class="hidden">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="statsContainer">
                <!-- Akan diisi JavaScript -->
            </div>

            <!-- Add Poem -->
            <div class="bg-white rounded-2xl shadow-xl p-8 mb-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-plus-circle text-purple-600 mr-2"></i>Tambah Puisi
                </h2>
                <form id="poemForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 mb-2">Judul</label>
                            <input type="text" id="title" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">Penulis</label>
                            <input type="text" id="author" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Kategori</label>
                        <select id="category" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="cinta">❤️ Cinta</option>
                            <option value="kehidupan">🌱 Kehidupan</option>
                            <option value="alam">🌿 Alam</option>
                            <option value="sosial">🤝 Sosial</option>
                            <option value="religi">🕌 Religi</option>
                            <option value="lainnya">📝 Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Isi Puisi</label>
                        <textarea id="content" rows="6" required
                                  class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                    </div>
                    <button type="submit" 
                            class="px-6 py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition">
                        <i class="fas fa-save mr-2"></i>Simpan
                    </button>
                </form>
            </div>

            <!-- Poems List -->
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-list text-purple-600 mr-2"></i>Daftar Puisi
                </h2>
                <div id="poemsList" class="space-y-4">
                    <!-- Akan diisi JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('adminToken');
        
        // Check auth
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                showDashboard();
            } else {
                showLogin();
            }
        });

        // Login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('adminToken', token);
                    showDashboard();
                    await loadPoems();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Gagal login');
            }
        });

        // Add poem
        document.getElementById('poemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const poemData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                content: document.getElementById('content').value,
                category: document.getElementById('category').value
            };
            
            try {
                const response = await fetch('/api/poems', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(poemData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ' + data.message);
                    document.getElementById('poemForm').reset();
                    await loadPoems();
                } else {
                    alert('❌ Gagal menambahkan');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });

        // Load poems
        async function loadPoems() {
            try {
                const response = await fetch('/api/poems');
                const data = await response.json();
                
                if (!data.success) throw new Error('Gagal load data');
                
                const poems = data.data;
                const container = document.getElementById('poemsList');
                
                // Update stats
                const statsHTML = `
                    <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-purple-500">
                        <p class="text-gray-500 text-sm">Total Puisi</p>
                        <p class="text-3xl font-bold">${poems.length}</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-pink-500">
                        <p class="text-gray-500 text-sm">Total Penulis</p>
                        <p class="text-3xl font-bold">${new Set(poems.map(p => p.author)).size}</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-blue-500">
                        <p class="text-gray-500 text-sm">Total Views</p>
                        <p class="text-3xl font-bold">${poems.reduce((sum, p) => sum + (p.views || 0), 0)}</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-green-500">
                        <p class="text-gray-500 text-sm">Kategori</p>
                        <p class="text-3xl font-bold">${new Set(poems.map(p => p.category)).size}</p>
                    </div>
                `;
                document.getElementById('statsContainer').innerHTML = statsHTML;
                
                if (poems.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-2"></i>
                            <p>Belum ada puisi</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = poems.map(poem => `
                    <div class="bg-gray-50 rounded-xl p-4 flex justify-between items-start hover:shadow-md transition border border-gray-200">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="px-2 py-1 bg-purple-100 text-purple-700 rounded text-xs">${poem.category}</span>
                                <span class="text-xs text-gray-400"><i class="far fa-eye"></i> ${poem.views || 0}</span>
                            </div>
                            <h3 class="font-semibold text-gray-800">${escapeHtml(poem.title)}</h3>
                            <p class="text-sm text-purple-600">✍️ ${escapeHtml(poem.author)}</p>
                            <p class="text-sm text-gray-600 mt-1 line-clamp-2">${escapeHtml(poem.content)}</p>
                        </div>
                        <div class="flex space-x-2 ml-4">
                            <button onclick="editPoem(${poem.id})" 
                                    class="px-3 py-1 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition text-sm">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deletePoem(${poem.id})" 
                                    class="px-3 py-1 bg-red-500 text-white rounded-lg hover:bg-red-600 transition text-sm">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Delete poem
        async function deletePoem(id) {
            if (!confirm('Yakin ingin menghapus puisi ini?')) return;
            
            try {
                const response = await fetch(`/api/poems/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ' + data.message);
                    await loadPoems();
                } else {
                    alert('❌ Gagal menghapus');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Edit poem
        async function editPoem(id) {
            try {
                const response = await fetch(`/api/poems/${id}`);
                const data = await response.json();
                
                if (!data.success) throw new Error('Gagal load data');
                
                const poem = data.data;
                
                document.getElementById('title').value = poem.title;
                document.getElementById('author').value = poem.author;
                document.getElementById('content').value = poem.content;
                document.getElementById('category').value = poem.category || 'lainnya';
                
                // Ubah form untuk update
                const form = document.getElementById('poemForm');
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.textContent = '🔄 Update';
                submitBtn.className = 'px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition';
                
                form.onsubmit = async (e) => {
                    e.preventDefault();
                    
                    const updatedData = {
                        title: document.getElementById('title').value,
                        author: document.getElementById('author').value,
                        content: document.getElementById('content').value,
                        category: document.getElementById('category').value
                    };
                    
                    try {
                        const updateResponse = await fetch(`/api/poems/${id}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(updatedData)
                        });
                        
                        const result = await updateResponse.json();
                        
                        if (result.success) {
                            alert('✅ ' + result.message);
                            form.reset();
                            submitBtn.textContent = '💾 Simpan';
                            submitBtn.className = 'px-6 py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition';
                            form.onsubmit = defaultSubmit;
                            await loadPoems();
                        } else {
                            alert('❌ Gagal update');
                        }
                    } catch (error) {
                        alert('❌ Error: ' + error.message);
                    }
                };
                
                // Scroll ke form
                form.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Default submit
        function defaultSubmit(e) {
            e.preventDefault();
            document.getElementById('poemForm').dispatchEvent(new Event('submit'));
        }

        function showDashboard() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            loadPoems();
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('adminToken');
            token = null;
            showLogin();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
