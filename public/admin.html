<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Ruang Aksara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .admin-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .admin-input:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.1);
        }
        
        .admin-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .admin-input option {
            background: #1a1a2e;
        }
        
        .admin-btn-primary {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .admin-btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }
        
        .admin-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .admin-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(167, 139, 250, 0.3);
        }
        
        .poem-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.3s ease;
        }
        
        .poem-item:hover {
            border-color: rgba(167, 139, 250, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav-glass {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="nav-glass fixed top-0 left-0 right-0 z-50 px-4 py-3">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-feather-alt text-2xl" style="color: #a78bfa;"></i>
                <h1 class="text-xl font-bold gradient-text">Admin Panel</h1>
            </div>
            <div class="flex items-center space-x-3">
                <span id="adminStatus" class="text-sm text-gray-400">👤 Admin</span>
                <button onclick="logout()" class="admin-btn-secondary">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </button>
                <a href="/" class="admin-btn-secondary">
                    <i class="fas fa-arrow-left mr-2"></i>Kembali
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 pt-24 pb-12">
        <!-- Login Form -->
        <div id="loginForm" class="max-w-md mx-auto glass-card rounded-2xl p-8">
            <div class="text-center mb-8">
                <div class="inline-block p-4 rounded-full" style="background: rgba(167,139,250,0.1);">
                    <i class="fas fa-lock text-4xl" style="color: #a78bfa;"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mt-4">Login Admin</h2>
                <p class="text-gray-400 text-sm">Masuk untuk mengelola puisi</p>
            </div>
            <form id="adminLoginForm">
                <div class="mb-4">
                    <label class="block text-gray-300 text-sm mb-2">Username</label>
                    <input type="text" id="username" required class="admin-input" placeholder="Masukkan username">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-300 text-sm mb-2">Password</label>
                    <input type="password" id="password" required class="admin-input" placeholder="Masukkan password">
                </div>
                <button type="submit" class="admin-btn-primary w-full">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
            </form>
        </div>

        <!-- Dashboard -->
        <div id="adminDashboard" class="hidden">
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="statsContainer">
                <!-- Akan diisi JavaScript -->
            </div>

            <!-- Add Poem -->
            <div class="glass-card rounded-2xl p-8 mb-8">
                <h2 class="text-2xl font-bold text-white mb-6">
                    <i class="fas fa-plus-circle mr-2" style="color: #a78bfa;"></i>Tambah Puisi
                </h2>
                <form id="poemForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-300 text-sm mb-2">Judul Puisi</label>
                            <input type="text" id="title" required class="admin-input" placeholder="Masukkan judul">
                        </div>
                        <div>
                            <label class="block text-gray-300 text-sm mb-2">Nama Penulis</label>
                            <input type="text" id="author" required class="admin-input" placeholder="Masukkan penulis">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm mb-2">Kategori</label>
                        <select id="category" class="admin-input" style="appearance: auto;">
                            <option value="cinta">❤️ Cinta</option>
                            <option value="kehidupan">🌱 Kehidupan</option>
                            <option value="alam">🌿 Alam</option>
                            <option value="sosial">🤝 Sosial</option>
                            <option value="religi">🕌 Religi</option>
                            <option value="lainnya">📝 Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm mb-2">Isi Puisi</label>
                        <textarea id="content" rows="6" required class="admin-input" placeholder="Tuliskan puisi di sini..."></textarea>
                    </div>
                    <button type="submit" class="admin-btn-primary">
                        <i class="fas fa-save mr-2"></i>Simpan Puisi
                    </button>
                </form>
            </div>

            <!-- Poems List -->
            <div class="glass-card rounded-2xl p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-white">
                        <i class="fas fa-list mr-2" style="color: #a78bfa;"></i>Daftar Puisi
                    </h2>
                    <span class="text-sm text-gray-400" id="poemsCount">0 puisi</span>
                </div>
                <div id="poemsList" class="space-y-3">
                    <!-- Akan diisi JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('adminToken');
        let editingId = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                showDashboard();
            } else {
                showLogin();
            }
        });

        // Login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('adminToken', token);
                    showDashboard();
                    await loadPoems();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Gagal login');
            }
        });

        // Add/Update poem
        document.getElementById('poemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const poemData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                content: document.getElementById('content').value,
                category: document.getElementById('category').value
            };
            
            try {
                let url = '/api/poems';
                let method = 'POST';
                
                if (editingId) {
                    url = `/api/poems/${editingId}`;
                    method = 'PUT';
                }
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(poemData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ' + data.message);
                    document.getElementById('poemForm').reset();
                    document.querySelector('#poemForm button[type="submit"]').innerHTML = '<i class="fas fa-save mr-2"></i>Simpan Puisi';
                    editingId = null;
                    await loadPoems();
                } else {
                    alert('❌ Gagal menyimpan');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });

        // Load poems
        async function loadPoems() {
            try {
                const response = await fetch('/api/poems');
                const data = await response.json();
                
                if (!data.success) throw new Error('Gagal load data');
                
                const poems = data.data;
                const container = document.getElementById('poemsList');
                
                // Update stats
                const statsHTML = `
                    <div class="stat-card">
                        <p class="text-gray-400 text-sm">Total Puisi</p>
                        <p class="text-3xl font-bold text-white">${poems.length}</p>
                    </div>
                    <div class="stat-card">
                        <p class="text-gray-400 text-sm">Total Penulis</p>
                        <p class="text-3xl font-bold text-white">${new Set(poems.map(p => p.author)).size}</p>
                    </div>
                    <div class="stat-card">
                        <p class="text-gray-400 text-sm">Total Views</p>
                        <p class="text-3xl font-bold text-white">${poems.reduce((sum, p) => sum + (p.views || 0), 0)}</p>
                    </div>
                    <div class="stat-card">
                        <p class="text-gray-400 text-sm">Kategori</p>
                        <p class="text-3xl font-bold text-white">${new Set(poems.map(p => p.category)).size}</p>
                    </div>
                `;
                document.getElementById('statsContainer').innerHTML = statsHTML;
                document.getElementById('poemsCount').textContent = `${poems.length} puisi`;
                
                if (poems.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-3"></i>
                            <p>Belum ada puisi. Tambahkan puisi baru!</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = poems.map(poem => `
                    <div class="poem-item">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center space-x-2 mb-1">
                                    <span class="text-xs px-2 py-1 rounded-full" style="background: rgba(167,139,250,0.15); color: #a78bfa;">
                                        ${poem.category || 'lainnya'}
                                    </span>
                                    <span class="text-xs text-gray-500">
                                        <i class="far fa-eye mr-1"></i>${poem.views || 0}
                                    </span>
                                    <span class="text-xs text-gray-500">
                                        ${new Date(poem.date).toLocaleDateString('id-ID')}
                                    </span>
                                </div>
                                <h3 class="text-white font-semibold">${escapeHtml(poem.title)}</h3>
                                <p class="text-sm" style="color: #a78bfa;">✍️ ${escapeHtml(poem.author)}</p>
                                <p class="text-sm text-gray-400 mt-1 line-clamp-2">${escapeHtml(poem.content)}</p>
                            </div>
                            <div class="flex space-x-2 ml-4">
                                <button onclick="editPoem(${poem.id})" 
                                        class="px-3 py-1 rounded-lg text-sm transition" 
                                        style="background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2);">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deletePoem(${poem.id})" 
                                        class="px-3 py-1 rounded-lg text-sm transition"
                                        style="background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.2);">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Delete poem
        async function deletePoem(id) {
            if (!confirm('Yakin ingin menghapus puisi ini?')) return;
            
            try {
                const response = await fetch(`/api/poems/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ' + data.message);
                    await loadPoems();
                } else {
                    alert('❌ Gagal menghapus');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Edit poem
        async function editPoem(id) {
            try {
                const response = await fetch(`/api/poems/${id}`);
                const data = await response.json();
                
                if (!data.success) throw new Error('Gagal load data');
                
                const poem = data.data;
                editingId = id;
                
                document.getElementById('title').value = poem.title;
                document.getElementById('author').value = poem.author;
                document.getElementById('content').value = poem.content;
                document.getElementById('category').value = poem.category || 'lainnya';
                
                const submitBtn = document.querySelector('#poemForm button[type="submit"]');
                submitBtn.innerHTML = '<i class="fas fa-sync mr-2"></i>Update Puisi';
                
                document.getElementById('poemForm').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        function showDashboard() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            document.getElementById('adminStatus').textContent = '👤 Admin';
            loadPoems();
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminStatus').textContent = '🔒 Not logged in';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            token = null;
            editingId = null;
            document.querySelector('#poemForm button[type="submit"]').innerHTML = '<i class="fas fa-save mr-2"></i>Simpan Puisi';
            document.getElementById('poemForm').reset();
            showLogin();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
