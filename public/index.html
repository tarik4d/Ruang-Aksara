<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Aksara | Menulis Rasa dalam Setiap Bait Kata</title>
    <meta name="description" content="Ruang Aksara merupakan website kumpulan puisi dan karya sastra Indonesia. Nikmati berbagai puisi tentang cinta, kehidupan, alam, dan inspirasi dari para penulis Indonesia.">
    <meta name="keywords" content="Ruang Aksara, puisi Indonesia, kumpulan puisi, karya sastra, puisi cinta, puisi kehidupan, puisi alam, sastra Indonesia">
    <meta name="author" content="Ruang Aksara">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#7c3aed">
    <link rel="canonical" href="https://ruang-aksara.onrender.com">
    <link rel="shortcut icon" type="image/x-icon" href="https://the.splg.site/images/2026/06/21/aksara57de8146d0d3dd01.png">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ruang-aksara.onrender.com">
    <meta property="og:title" content="Ruang Aksara | Kumpulan Puisi dan Karya Sastra Indonesia">
    <meta property="og:description" content="Nikmati keindahan puisi dan karya sastra Indonesia dalam satu ruang penuh makna dan inspirasi.">
    <meta property="og:image" content="https://the.splg.site/images/2026/06/21/ssc.png">
    <meta property="og:site_name" content="Ruang Aksara">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ruang Aksara | Kumpulan Puisi dan Karya Sastra Indonesia">
    <meta name="twitter:description" content="Temukan berbagai puisi dan karya sastra Indonesia yang penuh makna dan inspirasi.">
    <meta name="twitter:image" content="https://the.splg.site/images/2026/06/21/ssc.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        /* Background dengan efek gradien gelap */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(236, 72, 153, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .glass-effect-light {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .nav-glass {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Poem Card */
        .poem-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 1.75rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .poem-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.08), rgba(236, 72, 153, 0.08));
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .poem-card:hover::before {
            opacity: 1;
        }
        
        .poem-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.12), 0 0 40px rgba(124, 58, 237, 0.05);
        }
        
        /* Poem Content - Read More */
        .poem-content {
            font-family: 'Playfair Display', serif;
            line-height: 2.1;
            white-space: pre-wrap;
            font-size: 1.05rem;
            color: #c8c8c8;
            position: relative;
            transition: all 0.4s ease;
        }
        
        .poem-content.expanded {
            max-height: none !important;
        }
        
        .poem-content:not(.expanded) {
            max-height: 160px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
        }
        
        /* Read More Button */
        .read-more-btn {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(236, 72, 153, 0.2));
            color: #a78bfa;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            border: 1px solid rgba(124, 58, 237, 0.2);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }
        
        .read-more-btn:hover {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(236, 72, 153, 0.3));
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.4);
        }
        
        /* Category Badge */
        .category-badge {
            padding: 0.25rem 0.85rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(124, 58, 237, 0.15);
            color: #a78bfa;
            border: 1px solid rgba(124, 58, 237, 0.15);
            letter-spacing: 0.3px;
        }
        
        /* Author Name */
        .author-name {
            color: #a78bfa;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        /* Date Text */
        .date-text {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.8rem;
            font-weight: 300;
        }
        
        /* Admin Button */
        .admin-btn {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }
        
        .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }
        
        /* Floating Particles */
        .floating-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.2), transparent 70%);
            animation: floatParticle 25s infinite linear;
            z-index: 0;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(0px) rotate(0deg) scale(1); opacity: 0.4; }
            50% { transform: translateY(-120px) rotate(180deg) scale(1.6); opacity: 0.8; }
            100% { transform: translateY(0px) rotate(360deg) scale(1); opacity: 0.4; }
        }
        
        /* Glow Line */
        .glow-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #7c3aed, #ec4899, transparent);
            width: 100%;
            max-width: 400px;
            margin: 1.5rem auto;
            border-radius: 10px;
        }
        
        /* Hero Section */
        .hero-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .hero-particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.1), transparent);
            animation: floatHero 20s infinite ease-in-out;
        }
        
        @keyframes floatHero {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
            50% { transform: translateY(-50px) scale(1.5); opacity: 0.6; }
        }
        
        /* Stats Badge */
        .stats-badge {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Scrollbar Custom */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #6d28d9, #db2777);
        }
        
        /* Animation Fade In */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .poem-card {
                padding: 1.25rem !important;
            }
            .poem-content {
                font-size: 0.95rem;
            }
            .hero-title {
                font-size: 2.5rem !important;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Particles Background -->
    <div class="floating-particle" style="width:400px;height:400px;top:-100px;right:-100px;animation-duration:28s;"></div>
    <div class="floating-particle" style="width:250px;height:250px;bottom:-80px;left:-80px;animation-duration:32s;animation-delay:-6s;"></div>
    <div class="floating-particle" style="width:180px;height:180px;top:50%;left:10%;animation-duration:35s;animation-delay:-12s;"></div>
    <div class="floating-particle" style="width:120px;height:120px;top:30%;right:15%;animation-duration:22s;animation-delay:-3s;"></div>

    <!-- Navbar -->
    <nav class="nav-glass fixed top-0 left-0 right-0 z-50 px-4 py-3">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-feather-alt text-2xl" style="color: #a78bfa;"></i>
                <h1 class="text-xl font-bold gradient-text" style="font-family: 'Playfair Display', serif;">
                    Ruang Aksara
                </h1>
            </div>
            <div class="flex items-center space-x-4">
                <span class="stats-badge hidden md:inline-block">
                    <i class="fas fa-book-open mr-2"></i>
                    <span id="poemCount">0</span> Puisi
                </span>
                <a href="/admin" class="admin-btn">
                    <i class="fas fa-user-cog mr-2"></i>Admin
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative pt-28 pb-12 px-4 text-center overflow-hidden">
        <div class="hero-particles">
            <div class="hero-particle" style="width:300px;height:300px;top:-50px;right:-50px;"></div>
            <div class="hero-particle" style="width:200px;height:200px;bottom:-30px;left:-30px;animation-delay:-8s;"></div>
        </div>
        <div class="container mx-auto max-w-4xl relative z-10">
            <div class="inline-block px-5 py-2 rounded-full glass-effect-light mb-5">
                <span class="text-xs font-medium" style="color: #a78bfa;"></span>
            </div>
            <h2 class="hero-title text-4xl md:text-6xl font-bold mb-4" style="font-family: 'Playfair Display', serif;">
                Menulis Rasa dalam <br>
                <span class="gradient-text">Setiap Bait Kata</span>
            </h2>
            <p class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto font-light leading-relaxed">
                Ketika Kata Menjadi Perasaan
            </p>
            <div class="glow-line"></div>
            <div class="flex flex-wrap justify-center gap-4 mt-6">
                <span class="px-4 py-2 glass-effect-light rounded-full text-xs text-gray-400">
                    <i class="fas fa-pen-fancy mr-2" style="color: #a78bfa;"></i>
                    Puisi Pilihan
                </span>
                <span class="px-4 py-2 glass-effect-light rounded-full text-xs text-gray-400">
                    <i class="fas fa-users mr-2" style="color: #ec4899;"></i>
                    Para Penyair
                </span>
                <span class="px-4 py-2 glass-effect-light rounded-full text-xs text-gray-400">
                    <i class="fas fa-heart mr-2" style="color: #f472b6;"></i>
                    Karya Terbaik
                </span>
            </div>
        </div>
    </section>

    <!-- Poems Grid -->
    <section class="container mx-auto px-4 pb-20 relative z-10">
        <div id="poemsContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- Akan diisi JavaScript -->
        </div>
        
        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="text-center py-16 hidden">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-purple-500 border-t-transparent"></div>
            <p class="text-gray-500 mt-4 text-sm">Memuat puisi...</p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-6 px-4 relative z-10">
        <div class="container mx-auto text-center">
            <p class="text-gray-600 text-sm">
                © 2026 <span class="text-purple-400">Muhammad Irwan</span>. Dibuat dengan 
                <i class="fas fa-heart text-pink-500"></i> untuk para pecinta puisi
            </p>
        </div>
    </footer>

    <script>
        let allPoems = [];

        // Load poems
        async function loadPoems() {
            const container = document.getElementById('poemsContainer');
            const spinner = document.getElementById('loadingSpinner');
            
            try {
                spinner.classList.remove('hidden');
                
                const response = await fetch('/api/poems');
                const data = await response.json();
                
                if (!data.success) throw new Error(data.message);
                
                allPoems = data.data;
                
                // Update count
                document.getElementById('poemCount').textContent = allPoems.length;
                
                if (allPoems.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-16">
                            <i class="fas fa-book-open text-6xl text-gray-700 mb-4"></i>
                            <p class="text-gray-500 text-lg">Belum ada puisi. Yuk tambahkan di Admin Panel!</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = allPoems.map((poem, index) => {
                    const isLong = poem.content.length > 250;
                    return `
                        <div class="poem-card fade-in" style="animation-delay: ${index * 0.1}s">
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex items-center space-x-2">
                                    <span class="category-badge">${getCategoryIcon(poem.category)}</span>
                                    <span class="text-xs text-gray-500">
                                        <i class="far fa-eye mr-1"></i>${poem.views || 0}
                                    </span>
                                </div>
                                <span class="date-text">
                                    ${formatDate(poem.date)}
                                </span>
                            </div>
                            
                            <h3 class="text-xl md:text-2xl font-bold text-white mb-1" style="font-family: 'Playfair Display', serif;">
                                ${escapeHtml(poem.title)}
                            </h3>
                            <p class="author-name text-sm mb-3">
                                <i class="fas fa-user mr-2"></i>${escapeHtml(poem.author)}
                            </p>
                            
                            <div class="poem-content ${!isLong ? 'expanded' : ''}" 
                                 id="content-${poem.id}">
                                ${escapeHtml(poem.content)}
                            </div>
                            
                            ${isLong ? `
                                <div class="mt-4 flex justify-end">
                                    <button onclick="toggleReadMore('${poem.id}')" 
                                            class="read-more-btn" 
                                            id="btn-${poem.id}">
                                        <i class="fas fa-chevron-down mr-2"></i>Baca Selengkapnya
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <i class="fas fa-exclamation-circle text-6xl text-red-400 mb-4"></i>
                        <p class="text-red-400 text-lg">Gagal memuat puisi</p>
                        <p class="text-gray-500 text-sm mt-2">${error.message}</p>
                        <button onclick="loadPoems()" class="mt-4 px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition text-sm">
                            <i class="fas fa-sync mr-2"></i>Coba Lagi
                        </button>
                    </div>
                `;
            } finally {
                spinner.classList.add('hidden');
            }
        }

        // Toggle Read More
        function toggleReadMore(id) {
            const content = document.getElementById(`content-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                btn.innerHTML = '<i class="fas fa-chevron-down mr-2"></i>Baca Selengkapnya';
            } else {
                content.classList.add('expanded');
                btn.innerHTML = '<i class="fas fa-chevron-up mr-2"></i>Sembunyikan';
            }
        }

        // Helper Functions
        function getCategoryIcon(category) {
            const icons = {
                'cinta': '❤️ Cinta',
                'kehidupan': '🌱 Kehidupan',
                'alam': '🌿 Alam',
                'sosial': '🤝 Sosial',
                'religi': '🕌 Religi',
                'lainnya': '📝 Lainnya'
            };
            return icons[category] || icons['lainnya'];
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadPoems);

        // Auto-refresh setiap 60 detik
        setInterval(loadPoems, 60000);
    </script>
</body>
</html>
