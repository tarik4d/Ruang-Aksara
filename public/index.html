<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Aksara | Menulis Rasa dalam Setiap Bait Kata </title>
    <meta name="description" content="Ruang Aksara merupakan website kumpulan puisi dan karya sastra Indonesia. Nikmati berbagai puisi tentang cinta, kehidupan, alam, dan inspirasi dari para penulis Indonesia.">
    <meta name="keywords" content="Ruang Aksara, puisi Indonesia, kumpulan puisi, karya sastra, puisi cinta, puisi kehidupan, puisi alam, sastra Indonesia">
    <meta name="author" content="Ruang Aksara">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#7c3aed">
    <link rel="canonical" href="https://domainanda.com/">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://domainanda.com/">
    <meta property="og:title" content="Ruang Aksara | Kumpulan Puisi dan Karya Sastra Indonesia">
    <meta property="og:description" content="Nikmati keindahan puisi dan karya sastra Indonesia dalam satu ruang penuh makna dan inspirasi.">
    <meta property="og:image" content="https://domainanda.com/og-image.jpg">
    <meta property="og:site_name" content="Ruang Aksara">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ruang Aksara | Kumpulan Puisi dan Karya Sastra Indonesia">
    <meta name="twitter:description" content="Temukan berbagai puisi dan karya sastra Indonesia yang penuh makna dan inspirasi.">
    <meta name="twitter:image" content="https://domainanda.com/og-image.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-50 via-white to-pink-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-feather-alt text-3xl text-purple-600"></i>
                <h1 class="text-2xl font-bold text-gray-800">Ruang Aksara</h1>
            </div>
            <a href="/admin" class="px-5 py-2 bg-purple-600 text-white rounded-full hover:bg-purple-700 transition shadow-lg hover:shadow-xl">
                <i class="fas fa-user-cog mr-2"></i>Admin
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="container mx-auto px-4 py-12 text-center">
        <h2 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
            Menulis Rasa dalam Setiap <span class="text-purple-600">Bait Kata</span>
        </h2>
        <p class="text-gray-600 text-lg">Ketika Kata Menjadi Perasaan</p>
    </section>

    <!-- Poems -->
    <section class="container mx-auto px-4 pb-12">
        <div id="poemsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Akan diisi JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white/80 backdrop-blur-md border-t border-purple-100 mt-8">
        <div class="container mx-auto px-4 py-6 text-center text-gray-600">
            <p>&copy; 2026 Muhammad Irwan. Dibuat dengan ❤️</p>
        </div>
    </footer>

    <script>
        // Load poems
        async function loadPoems() {
            try {
                const response = await fetch('/api/poems');
                const data = await response.json();
                
                const container = document.getElementById('poemsContainer');
                
                if (!data.success || data.data.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <i class="fas fa-book-open text-6xl text-gray-300"></i>
                            <p class="text-gray-500 mt-4">Belum ada puisi. Yuk tambahkan di Admin Panel!</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.data.map(poem => `
                    <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 border border-purple-100">
                        <div class="flex justify-between items-start mb-3">
                            <span class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs">
                                ${getCategoryIcon(poem.category)}
                            </span>
                            <span class="text-gray-400 text-sm">
                                <i class="far fa-eye"></i> ${poem.views || 0}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${escapeHtml(poem.title)}</h3>
                        <p class="text-purple-600 text-sm mb-3">✍️ ${escapeHtml(poem.author)}</p>
                        <p class="text-gray-700 text-sm whitespace-pre-line line-clamp-4">${escapeHtml(poem.content)}</p>
                        <div class="mt-4 pt-3 border-t border-gray-100 text-xs text-gray-400">
                            📅 ${new Date(poem.date).toLocaleDateString('id-ID', {
                                year: 'numeric',
                                month: 'long',
                                day: 'numeric'
                            })}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function getCategoryIcon(category) {
            const icons = {
                'cinta': '❤️ Cinta',
                'kehidupan': '🌱 Kehidupan',
                'alam': '🌿 Alam',
                'sosial': '🤝 Sosial',
                'religi': '🕌 Religi',
                'lainnya': '📝 Lainnya'
            };
            return icons[category] || icons['lainnya'];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadPoems);
    </script>
</body>
</html>
